[build]
  base = "FrontEnd"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/login"
  to = "/.netlify/functions/auth?action=login"
  status = 200

[[redirects]]
  from = "/api/register"
  to = "/.netlify/functions/auth?action=register"
  status = 200

[[redirects]]
  from = "/api/products"
  to = "/.netlify/functions/products"
  status = 200

[[redirects]]
  from = "/api/products/:id"
  to = "/.netlify/functions/products/:id"
  status = 200

[[redirects]]
  from = "/api/create-order"
  to = "/.netlify/functions/create-order"
  status = 200

[[redirects]]
  from = "/api/verify-payment"
  to = "/.netlify/functions/verify-payment"
  status = 200
